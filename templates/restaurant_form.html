{% extends "base.html" %}

{% block content %}
<main class="single-column">
  <section class="panel auth-panel spotlight-panel">
    <div class="section-heading compact">
      <div>
        <p class="eyebrow">Venue admin</p>
        <h2>{{ 'Edit restaurant' if restaurant else 'Add restaurant' }}</h2>
      </div>
      <p>Keep venue records reusable so repeat visits and rankings stay attached to the same restaurant entry.</p>
    </div>
    <form method="post" class="form-grid">
      <label>
        <span>Name</span>
        <input type="text" name="name" value="{{ request.form.get('name', restaurant.name if restaurant else '') }}" required />
      </label>
      <label>
        <span>City</span>
        <input type="text" name="city" value="{{ request.form.get('city', restaurant.city if restaurant else '') }}" required />
      </label>
      <label>
        <span>Category</span>
        <input type="text" name="category" value="{{ request.form.get('category', restaurant.category if restaurant else '') }}" required />
      </label>
      <label class="checkbox-row">
        <input
          type="checkbox"
          name="active"
          {% if request.method == 'POST' %}
          {% if request.form.get('active') == 'on' %}checked{% endif %}
          {% elif restaurant is none or restaurant.active %}
          checked
          {% endif %}
        />
        <span>Active restaurant</span>
      </label>
      <button type="submit" class="button button-primary">{{ 'Save restaurant' if restaurant else 'Create restaurant' }}</button>
    </form>
  </section>
</main>
{% endblock %}
