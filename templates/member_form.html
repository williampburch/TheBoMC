{% extends "base.html" %}

{% block content %}
<main class="single-column">
  <section class="panel auth-panel spotlight-panel">
    <div class="section-heading compact">
      <div>
        <p class="eyebrow">Roster admin</p>
        <h2>{{ 'Edit member' if person else 'Add member' }}</h2>
      </div>
      <p>Members still use the legacy first/last name structure, but they can now link to a site account for admin-aware roster sorting.</p>
    </div>
    <form method="post" class="form-grid">
      <div class="grid-two">
        <label>
          <span>First name</span>
          <input
            type="text"
            name="first_name"
            value="{{ request.form.get('first_name', person.first_name if person else '') }}"
            required
          />
        </label>
        <label>
          <span>Last name</span>
          <input
            type="text"
            name="last_name"
            value="{{ request.form.get('last_name', person.last_name if person else '') }}"
            required
          />
        </label>
      </div>
      <label>
        <span>Linked account</span>
        {% set selected_account_id = request.form.get('account_id', person.account_id if person and person.account_id else '') %}
        <select name="account_id">
          <option value="">No linked account</option>
          {% for account in account_choices %}
          <option value="{{ account.id }}" {% if selected_account_id|string == account.id|string %}selected{% endif %}>
            {{ account.username }}{% if account.is_admin %} · admin{% endif %}
          </option>
          {% endfor %}
        </select>
      </label>
      <button type="submit" class="button button-primary">{{ 'Save member' if person else 'Create member' }}</button>
    </form>
  </section>
</main>
{% endblock %}
