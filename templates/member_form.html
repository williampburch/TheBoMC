{% extends "base.html" %}

{% block content %}
<main class="single-column">
  <section class="panel auth-panel spotlight-panel">
    <div class="section-heading compact">
      <div>
        <p class="eyebrow">Roster admin</p>
        <h2>{{ 'Edit member' if person else 'Add member' }}</h2>
      </div>
      <p>Members stay aligned to the legacy structure: first name and last name only.</p>
    </div>
    <form method="post" class="form-grid">
      <div class="grid-two">
        <label>
          <span>First name</span>
          <input
            type="text"
            name="first_name"
            value="{{ request.form.get('first_name', person.first_name if person else '') }}"
            required
          />
        </label>
        <label>
          <span>Last name</span>
          <input
            type="text"
            name="last_name"
            value="{{ request.form.get('last_name', person.last_name if person else '') }}"
            required
          />
        </label>
      </div>
      <button type="submit" class="button button-primary">{{ 'Save member' if person else 'Create member' }}</button>
    </form>
  </section>
</main>
{% endblock %}
