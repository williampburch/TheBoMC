{% extends "base.html" %}

{% block content %}
<main class="single-column">
  <section class="panel auth-panel spotlight-panel">
    <div class="section-heading compact">
      <div>
        <p class="eyebrow">Member access</p>
        <h2>Sign in to comment or manage the ledger</h2>
      </div>
      <p>Legacy usernames still work after import. Admin users can also update visits and members.</p>
    </div>
    <form method="post" class="form-grid">
      <label>
        <span>Username</span>
        <input type="text" name="username" required />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" required />
      </label>
      <button type="submit" class="button button-primary">Sign In</button>
    </form>
  </section>
</main>
{% endblock %}
