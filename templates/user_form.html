{% extends "base.html" %}

{% block content %}
<main class="single-column">
  <section class="panel auth-panel spotlight-panel">
    <div class="section-heading compact">
      <div>
        <p class="eyebrow">User workflow</p>
        <h2>Create another user</h2>
      </div>
      <p>Use this for members who need login access. Keep the administrator flag limited to people who manage the ledger.</p>
    </div>
    <form method="post" class="form-grid">
      <label>
        <span>Username</span>
        <input type="text" name="username" required />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" required />
      </label>
      <label class="checkbox-row">
        <input type="checkbox" name="is_admin" checked />
        <span>Administrator</span>
      </label>
      <button type="submit" class="button button-primary">Create User</button>
    </form>
  </section>
</main>
{% endblock %}
