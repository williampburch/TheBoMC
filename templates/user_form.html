{% extends "base.html" %}

{% block content %}
<main class="single-column">
  <section class="panel auth-panel spotlight-panel">
    <div class="section-heading compact">
      <div>
        <p class="eyebrow">Admin workflow</p>
        <h2>Create another admin</h2>
      </div>
      <p>Keep admin accounts limited to people who should actually manage the club ledger.</p>
    </div>
    <form method="post" class="form-grid">
      <label>
        <span>Display name</span>
        <input type="text" name="display_name" required />
      </label>
      <label>
        <span>Email</span>
        <input type="email" name="email" required />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" required />
      </label>
      <button type="submit" class="button button-primary">Create Admin</button>
    </form>
  </section>
</main>
{% endblock %}
